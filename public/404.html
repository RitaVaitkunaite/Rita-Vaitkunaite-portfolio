<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rita Vaitkunaite — UX Portfolio</title>
    <script>
      // Single-page app routing for GitHub Pages.
      // Encodes the path into a query string so index.html can restore it.
      // segmentCount = 1 for project sites (USERNAME.github.io/REPO_NAME)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
